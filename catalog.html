<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог товарів | ELITE KICKS</title>
  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Кастомні стилі каталогу -->
  <link rel="stylesheet" href="catalog.css">
</head>
<body>

  <!-- НАВІГАЦІЯ -->
  <header class="navbar-custom fixed-top bg-white border-bottom shadow-sm d-flex align-items-center">
    <div class="container-max d-flex justify-content-between align-items-center px-4 px-md-5 w-100">
      <div class="brand-logo text-primary cursor-pointer" onclick="window.location.href='index.html'">
        ELITE KICKS
      </div>
      <nav class="nav-links d-none d-md-flex gap-4 align-items-center">
        <a href="index.html" class="nav-link-btn">Головна</a>
        <a href="catalog.html" class="nav-link-btn active-link">Магазин</a>
        <a href="cart.html" class="nav-link-btn">Кошик</a>
      </nav>
      <div class="d-flex align-items-center gap-3">
        <!-- Пошук по каталогу -->
        <div class="search-box position-relative d-none d-sm-block">
          <input type="text" id="catalogSearch" placeholder="Пошук кросівок..." class="form-control form-control-sm pe-4 rounded-pill text-xs">
          <i class="bi bi-search position-absolute top-50 end-0 translate-middle-y me-2.5 text-muted text-xs"></i>
        </div>
        <button class="currency-btn d-flex align-items-center gap-1.5 px-3 py-1 rounded-pill" id="currencyToggle">
          <i class="bi bi-globe text-primary"></i>
          <span id="currencyText">UAH</span>
        </button>
        <button class="icon-btn p-2 rounded-circle position-relative" onclick="window.location.href='cart.html'">
          <i class="bi bi-cart3 fs-4 text-primary"></i>
          <span class="cart-badge position-absolute top-0 start-100 translate-middle badge rounded-circle bg-danger" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ГОЛОВНИЙ БЛОК КАТАЛОГУ -->
  <main class="main-content container-max px-4 px-md-5 py-5 text-start">
    
    <!-- Заголовок та лічильник результатів -->
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 gap-2">
      <div>
        <h1 class="font-black text-uppercase text-dark tracking-tight fs-2 m-0">Каталог взуття</h1>
        <p class="text-muted text-xs font-semibold uppercase tracking-wider mt-1" id="itemsCounter">Показано: 0 товарів</p>
      </div>
      
      <!-- Сортування -->
      <div class="d-flex align-items-center gap-2 w-100 w-sm-auto">
        <label class="text-muted font-bold text-xs text-uppercase tracking-wider text-nowrap m-0">Сортувати:</label>
        <select class="form-select form-select-sm font-bold text-xs bg-white border rounded shadow-xs" id="sortSelect" style="max-width: 200px;">
          <option value="default">За замовчуванням</option>
          <option value="price-asc">Ціна: від найнижчої</option>
          <option value="price-desc">Ціна: від найвищої</option>
        </select>
      </div>
    </div>

    <div class="row g-4">
      
      <!-- БІЧНА ПАНЕЛЬ: ФІЛЬТРИ (Легко адаптується в мобільний варіант) -->
      <aside class="col-lg-3">
        <div class="card p-4 border shadow-sm rounded-3 bg-white sticky-lg-top" style="top: 100px; z-index: 10;">
          <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
            <h5 class="font-black text-uppercase text-dark m-0 fs-6">Фільтри</h5>
            <button class="btn btn-link text-muted p-0 text-xs font-bold text-uppercase text-decoration-none" id="resetFiltersBtn">Скинути</button>
          </div>

          <!-- Категорії (Радіо-кнопки / Таби) -->
          <div class="mb-4">
            <h6 class="font-bold text-uppercase text-xs tracking-wider text-muted mb-2.5">Категорія</h6>
            <div class="d-flex flex-column gap-2 filter-group" id="categoryFilterGroup">
              <div class="form-check text-xs font-semibold">
                <input class="form-check-input" type="radio" name="categoryFilter" id="cat-all" value="all" checked>
                <label class="form-check-label text-dark" for="cat-all">Усі категорії</label>
              </div>
              <div class="form-check text-xs font-semibold">
                <input class="form-check-input" type="radio" name="categoryFilter" id="cat-run" value="Running">
                <label class="form-check-label text-dark" for="cat-run">Бігові (Performance)</label>
              </div>
              <div class="form-check text-xs font-semibold">
                <input class="form-check-input" type="radio" name="categoryFilter" id="cat-life" value="Lifestyle">
                <label class="form-check-label text-dark" for="cat-life">Повсякденні (Lifestyle)</label>
              </div>
              <div class="form-check text-xs font-semibold">
                <input class="form-check-input" type="radio" name="categoryFilter" id="cat-basket" value="Basketball">
                <label class="form-check-label text-dark" for="cat-basket">Баскетбол</label>
              </div>
            </div>
          </div>

          <!-- Бренди (Чекбокси) -->
          <div>
            <h6 class="font-bold text-uppercase text-xs tracking-wider text-muted mb-2.5">Бренд</h6>
            <div class="d-flex flex-column gap-2 filter-group" id="brandFilterGroup">
              <div class="form-check text-xs font-semibold">
                <input class="form-check-input brand-checkbox" type="checkbox" value="Nike" id="brand-nike">
                <label class="form-check-label text-dark" for="brand-nike">Nike</label>
              </div>
              <div class="form-check text-xs font-semibold">
                <input class="form-check-input brand-checkbox" type="checkbox" value="Adidas" id="brand-adidas">
                <label class="form-check-label text-dark" for="brand-adidas">Adidas</label>
              </div>
              <div class="form-check text-xs font-semibold">
                <input class="form-check-input brand-checkbox" type="checkbox" value="Puma" id="brand-puma">
                <label class="form-check-label text-dark" for="brand-puma">Puma</label>
              </div>
            </div>
          </div>

        </div>
      </aside>

      <!-- ОСНОВНА СІТКА ТОВАРІВ -->
      <section class="col-lg-9">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4" id="catalogGrid">
          <!-- Картки генеруються за допомогою JavaScript динамічно -->
        </div>

        <!-- Стан, коли нічого не знайдено -->
        <div class="text-center py-5 border border-dashed rounded-3 bg-light d-none" id="noProductsView">
          <i class="bi bi-search-heart fs-1 text-muted opacity-50 mb-3"></i>
          <h4 class="font-bold text-dark fs-5">Нічого не знайдено</h4>
          <p class="text-muted text-xs max-w-xs mx-auto mt-1">Спробуйте змінити критерії пошуку чи скинути фільтри.</p>
        </div>
      </section>

    </div>
  </main>

  <!-- Тост-сповіщення про додавання в кошик (Аналог гарного UI-feedback) -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="cartToast" class="toast align-items-center text-white bg-dark border-0 rounded-2" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body text-xs font-bold p-3">
          <i class="bi bi-check-circle-fill text-success me-2"></i> Товар успішно додано до кошика!
        </div>
        <button type="button" class="btn-close btn-close-white m-auto me-2" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Скрипт каталогу -->
  <script src="catalog.js"></script>
</body>
</html>
